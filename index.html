<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Log | I Miei Viaggi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0d0d12;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-hover: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #ff0055;
            --accent-gradient: linear-gradient(135deg, #ff0055, #ff5500);
            --font-main: 'Outfit', sans-serif;
            --modal-bg: #16161e;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.6;
        }

        .background-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 10% 20%, rgba(255, 0, 85, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 85, 0, 0.05) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        header {
            text-align: center;
            padding: 5rem 1rem 3rem;
            animation: fadeInDown 1s ease-out;
        }

        header h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            filter: drop-shadow(0 0 10px rgba(255, 0, 85, 0.3));
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.2rem;
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem 6rem;
        }

        #trips-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
            margin-top: 2rem;
        }

        .trip-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.8s ease-out backwards;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .trip-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card-img-wrapper {
            width: 100%;
            height: 240px;
            overflow: hidden;
            position: relative;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .trip-card:hover .card-image {
            transform: scale(1.1);
        }

        .card-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-date {
            display: inline-block;
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 0.2rem 0.6rem;
            background: rgba(255, 0, 85, 0.1);
            border-radius: 4px;
            width: fit-content;
        }

        .card-title {
            font-size: 1.4rem;
            margin-bottom: 0.75rem;
            line-height: 1.2;
            font-weight: 600;
            color: #fff;
        }

        .card-snippet {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-top: auto;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--modal-bg);
            width: 100%;
            max-width: 850px;
            max-height: 90vh;
            border-radius: 32px;
            overflow-y: auto;
            position: relative;
            z-index: 2001;
            transform: translateY(40px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border);
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            position: relative;
            width: 100%;
            height: 400px;
        }

        #modal-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-title-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 3rem 2rem 2rem;
            background: linear-gradient(to top, var(--modal-bg), transparent);
        }

        #modal-destination {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            margin-bottom: 0.5rem;
            font-weight: 700;
            line-height: 1.1;
        }

        #modal-date {
            color: var(--accent);
            font-size: 1.1rem;
            font-weight: 500;
        }

        .modal-body {
            padding: 2.5rem;
        }

        #modal-desc {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #d0d0d8;
            margin-bottom: 2.5rem;
            white-space: pre-wrap;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            border-top: 1px solid var(--glass-border);
            padding-top: 1.5rem;
        }

        .price-tag {
            background: var(--accent-gradient);
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3);
        }

        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2002;
            transition: all 0.3s ease;
            line-height: 1;
            padding-bottom: 4px;
        }

        .close-btn:hover {
            background: var(--accent);
            transform: rotate(90deg);
            border-color: transparent;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            header {
                padding-top: 3rem;
            }

            #trips-list {
                gap: 1.5rem;
            }

            .modal-header {
                height: 250px;
            }

            .modal-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="background-glow"></div>
    <header>
        <h1>Diario di Viaggio</h1>
        <p>Una collezione di ricordi, destinazioni e avventure vissute nel corso degli anni.</p>
    </header>
    <main>
        <div id="trips-list">
            <div style="text-align: center; grid-column: 1/-1; padding: 4rem; color: var(--text-secondary);">
                Caricamento dei tuoi viaggi...
            </div>
        </div>
    </main>

    <div id="trip-modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="close-btn" aria-label="Chiudi">&times;</button>
            <div class="modal-header">
                <img id="modal-img" src="" alt="Dettaglio Viaggio">
                <div class="modal-title-overlay">
                    <h2 id="modal-destination">Destinazione</h2>
                    <span id="modal-date">Data del Viaggio</span>
                </div>
            </div>
            <div class="modal-body">
                <p id="modal-desc">Descrizione in fase di caricamento...</p>
                <div class="modal-footer">
                    <span id="modal-price" class="price-tag">€0,00</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Script caricato alla fine -->
    <script src="scriptNEW.js"></script>
</body>

</html>
